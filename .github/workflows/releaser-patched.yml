name: goreleaser-patched

permissions:
  contents: write
  packages: write

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to build, e.g. v1.2.3'
        required: true

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Restore fork patch files
        shell: bash
        run: |
          mkdir -p patches
          git show origin/main:patches/server-host-port.patch > patches/server-host-port.patch
          git show origin/main:patches/goreleaser-docker.patch > patches/goreleaser-docker.patch

      - name: Validate release ref
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ inputs.release_tag }}" in
              v*.*.*) ;;
              *)
                echo "workflow_dispatch requires an existing semantic tag like v1.2.3"
                exit 1
                ;;
            esac

            git rev-parse --verify "refs/tags/${{ inputs.release_tag }}" >/dev/null 2>&1 || {
              echo "Tag not found: ${{ inputs.release_tag }}"
              exit 1
            }
          fi

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.4'
          cache-dependency-path: |
            go.work.sum

      - name: Set up Go legacy
        id: setup_go_legacy
        run: |
          dir="${{ vars.GOROOT_LEGACY }}"
          subdir="go-win7"
          finaldir="$dir/$subdir"
          curl -L https://github.com/XTLS/go-win7/releases/download/patched-1.26.4/go-for-win7-linux-amd64.zip -o go.zip
          sudo mkdir -p "$finaldir"
          sudo unzip -q go.zip -d "$finaldir"
          rm go.zip
          echo "goroot=$finaldir" >> "$GITHUB_OUTPUT"

      - name: Check patch
        run: git apply --check patches/server-host-port.patch

      - name: Apply patch
        run: git apply patches/server-host-port.patch

      - name: Check Docker patch
        run: git apply --check patches/goreleaser-docker.patch

      - name: Apply Docker patch
        run: git apply patches/goreleaser-docker.patch

      - name: Verify patched sources
        run: |
          grep -q 'net.JoinHostPort' server/internal/cmd/root.go

      - name: Generate Goreleaser config
        shell: bash
        run: |
          go run tools/scripts/cmd/generateGoreleaserConfig.go "${{ steps.setup_go_legacy.outputs.goroot }}"

      - name: Verify Docker release config
        run: grep -q 'ghcr.io/tofuliang/agelanserver' .goreleaser.yaml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean --fail-fast --skip=validate --skip=sign
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
